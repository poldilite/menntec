version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: menntec-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    container_name: menntec-cms
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${CMS_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    volumes:
      - cms_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: menntec-frontend
    environment:
      NEXT_PUBLIC_CMS_URL: ${CMS_URL}
      CMS_INTERNAL_URL: http://cms:3000
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    depends_on:
      - cms
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: menntec-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - cms
    restart: unless-stopped

volumes:
  postgres_data:
  cms_uploads:
