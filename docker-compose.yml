version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: menntec-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev-password
      POSTGRES_DB: menntec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile.dev
    container_name: menntec-cms
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: postgresql://postgres:dev-password@postgres:5432/menntec
      PAYLOAD_SECRET: dev-secret-key-change-in-prod
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./cms:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: menntec-frontend
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_CMS_URL: http://cms:3000
      NODE_ENV: development
    depends_on:
      - cms
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
