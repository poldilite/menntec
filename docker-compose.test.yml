version: '3.9'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: menntec-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - menntec-test
    restart: unless-stopped

  cms-test:
    build:
      context: ./cms
      dockerfile: Dockerfile
    container_name: menntec-cms-test
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-test:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${CMS_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    volumes:
      - cms_test_uploads:/app/public/uploads
    depends_on:
      postgres-test:
        condition: service_healthy
    networks:
      - menntec-test
    restart: unless-stopped

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: menntec-frontend-test
    environment:
      NEXT_PUBLIC_CMS_URL: ${CMS_URL}
      CMS_INTERNAL_URL: http://cms-test:3000
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    depends_on:
      - cms-test
    networks:
      - menntec-test
    restart: unless-stopped

networks:
  menntec-test:
    name: menntec-test

volumes:
  postgres_test_data:
  cms_test_uploads:
