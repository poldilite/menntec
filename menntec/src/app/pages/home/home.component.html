<div class="loading flex center_center wrapper" *ngIf="loading" [@fadeOut]>
  <img src="assets/img/MennTEC_logo_827x473px.png" alt="" />
</div>
<div class="content" *ngIf="!loading" [@fadeIn]>
  <app-hero *ngIf="!loading" [heroText]="heroText"></app-hero>
  <app-quote *ngIf="!loading" [descText]="descriptionText"></app-quote>
  <app-products></app-products>
  <app-about></app-about>
  <app-cta></app-cta>
  <!-- <app-contact></app-contact> -->
</div>
