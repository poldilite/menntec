<div class="product__card" *ngFor="let product of products; let oddEven = odd">
  <a href="">
    <div class="product__card__inner">
      <div
        class="product__card__inner__banner-box"
        [ngClass]="{
          'product__card__inner__banner-box--odd': oddEven,
          'product__card__inner__banner-box--even': !oddEven
        }"
      >
        <div
          class="product__card__inner__banner-box__banner"
          [ngClass]="{
            'product__card__inner__banner--odd': oddEven,
            'product__card__inner__banner--even': !oddEven
          }"
          *ngIf="product.new"
        >
          NEU
        </div>
        <div
          class="product__card__inner__banner-box__banner"
          [ngClass]="{
            'product__card__inner__banner--odd': oddEven,
            'product__card__inner__banner--even': !oddEven
          }"
          *ngIf="product.exclusive"
        >
          EXKLUSIV
        </div>
      </div>

      <div
        class="product__card__content"
        [ngClass]="{
          'product__card__content--odd': oddEven,
          'product__card__content--even': !oddEven
        }"
      >
        <div class="card-title bold">{{ product.name }}</div>
        <div class="card-description light">
          {{ product.description }}
        </div>
      </div>
      <div class="product__card__image">
        <img [src]="product.image.url" alt="" />
      </div>
    </div>
  </a>
</div>
